name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Force JS actions onto Node 24 until every Pages action ships a Node-24 major
# (configure-pages / upload-pages-artifact / deploy-pages still run on Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Regenerate type files from the source of truth
        run: node scripts/build.mjs

      - name: Fail if committed type files are stale
        run: git diff --exit-code types/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r index.html style.css app.mjs favicon.svg og.png data types _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
